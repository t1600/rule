# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 机场订阅
proxy-providers:
  订阅1:
    url: "机场订阅"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 节点信息
proxies:
  - { name: 直连, type: direct }

#端口
# port: 7890 # HTTP(S) 代理服务器端口
# socks-port: 7891 # SOCKS5 代理端口
mixed-port: 7890 # HTTP(S) 和 SOCKS 代理混合端口
# redir-port: 7892 # 透明代理端口，用于 Linux 和 MacOS

# Transparent proxy server port for Linux (TProxy TCP and TProxy UDP)
# tproxy-port: 7893

allow-lan: true
bind-address: "*"

# authentication: # http,socks 入口的验证用户名，密码
#   - "username:password"

#  find-process-mode has 3 values:always, strict, off
#  - always, 开启，强制匹配所有进程
#  - strict, 默认，由 mihomo 判断是否开启
#  - off, 不匹配进程，推荐在路由器上使用此模式
find-process-mode: strict

mode: rule

#自定义 geodata url
# geox-url:
#   geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
#   geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
#   mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"

# geo-auto-update: false # 是否自动更新 geodata
# geo-update-interval: 24 # 更新间隔，单位：小时

log-level: info
ipv6: false

unified-delay: true # 统一延迟，去除握手延迟
tcp-concurrent: true # TCP 并发连接所有 IP, 将使用最快握手的 TCP

# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
# Mihomo Docker
external-ui: "/root/.config/mihomo/ui"
external-ui-name: zashboard
external-ui-url: "https://hk.gh-proxy.com/https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# interface-name: en0 # 设置出口网卡
# 全局 TLS 指纹，优先低于 proxy 内的 client-fingerprint
# 可选： "chrome","firefox","safari","ios","random","none" options.
client-fingerprint: chrome

keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
profile:
  store-selected: true # 存储 select 选择记录
  store-fake-ip: true # 持久化 fake-ip

# 入站
tun:
  enable: false
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-detect-interface: true # 自动识别出口网卡
  auto-route: true # 配置路由表
  auto-redirect: true # 自动配置 iptables 以重定向 TCP 连接。仅支持 Linux。

# 嗅探
sniffer:
  enable: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  cache-algorithm: arc
  # 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
  # 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
  # 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
  # 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
  # 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
  respect-rules: true

  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  # 配置不使用 fake-ip 的域名
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"

  # 用于解析 nameserver，fallback 以及其他 DNS 服务器配置的，DNS 服务域名
  # 只能使用纯 IP 地址，可使用加密 DNS
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - tls://1.12.12.12:853
    - tls://223.5.5.5:853
    - system

  # 专用于节点域名解析的 DNS 服务器，非必要配置项，如果不填则遵循nameserver-policy、nameserver和fallback的配置
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query

  # DNS 主要域名配置
  # 支持 UDP，TCP，DoT，DoH，DoQ
  # 这部分为主要 DNS 配置，影响所有直连，确保使用对大陆解析精准的 DNS
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114

# 出站策略
# 注意锚点必须放在引用的上方，可以集中把锚点全部放yaml的顶部。
pr:
  &pr {
    type: select,
    proxies:
      [
        🚀 默认代理,
        🍀 省流节点,
        🔯 香港故转,
        🔯 日本故转,
        ♻️ 香港自动,
        ♻️ 日本自动,
        ♻️ 美国自动,
        ♻️ 韩国自动,
        ♻️ 新加坡自动,
        ♻️ 自动选择,
        🇭🇰 香港节点,
        🇯🇵 日本节点,
        🇺🇲 美国节点,
        🇰🇷 韩国节点,
        🇸🇬 新加坡节点,
        🌐 全部节点,
        直连
      ]
  }
proxy-groups:
  - {
      name: 🚀 默认代理,
      type: select,
      proxies:
        [
          🔯 香港故转,
          🍀 省流节点,
          🔯 日本故转,
          ♻️ 香港自动,
          ♻️ 日本自动,
          ♻️ 美国自动,
          ♻️ 韩国自动,
          ♻️ 新加坡自动,
          ♻️ 自动选择,
          🇭🇰 香港节点,
          🇯🇵 日本节点,
          🇺🇲 美国节点,
          🇰🇷 韩国节点,
          🇸🇬 新加坡节点,
          🌐 全部节点,
          直连
        ]
    }
  - { name: 🌐 全部节点, type: select, include-all: true }
  - {
      name: 🍀 省流节点,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "0.1|0.01"
    }
  - {
      name: 🇭🇰 香港节点,
      type: select,
      include-all: true,
      filter: "(?i)港|澳|台|hk|hongkong|hong kong"
    }
  - {
      name: 🇯🇵 日本节点,
      type: select,
      include-all: true,
      filter: "(?i)日|jp|japan"
    }
  - {
      name: 🇺🇲 美国节点,
      type: select,
      include-all: true,
      filter: "(?i)美|us|unitedstates|united states"
    }
  - {
      name: 🇰🇷 韩国节点,
      type: select,
      include-all: true,
      filter: "(?i)韩|kr|korea|southkorea|south korea"
    }
  - {
      name: 🇸🇬 新加坡节点,
      type: select,
      include-all: true,
      filter: "(?i)新|sg|singapore"
    }

  - { name: 📹 YouTube, <<: *pr }
  - { name: 🌸 Google, <<: *pr }
  - { name: 🤖 ChatGPT, <<: *pr }
  - { name: 👨🏿‍💻 GitHub, <<: *pr }
  - { name: 🐬 OneDrive, <<: *pr }
  - { name: 🪟 Microsoft, <<: *pr }
  # - {name: 🎵 TikTok, <<: *pr}
  - { name: 📲 Telegram, <<: *pr }
  # - {name: 🎥 NETFLIX, <<: *pr}
  # - {name: ✈️ Speedtest, <<: *pr}
  # - {name: 💶 PayPal, <<: *pr}
  # - {name: 🍎 Apple, type: select, proxies: [直连, 🚀 默认代理]}
  - { name: 🎯 直连, type: select, proxies: [直连, 🚀 默认代理] }
  - { name: 🐟 漏网之鱼, <<: *pr }
  - {
      name: ♻️ 自动选择,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "^((?!(直连)).)*$"
    }
  - {
      name: ♻️ 香港自动,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?=.*(港|澳|台|HK|(?i)Hong))^((?!(日|韩|新|深|美)).)*$"
    }
  - {
      name: ♻️ 日本自动,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"
    }
  - {
      name: ♻️ 美国自动,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"
    }
  - {
      name: ♻️ 韩国自动,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?i)韩|kr|korea|southkorea|south korea"
    }
  - {
      name: ♻️ 新加坡自动,
      type: url-test,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?i)新|sg|singapore"
    }

  - {
      name: 🔯 香港故转,
      type: fallback,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"
    }
  - {
      name: 🔯 日本故转,
      type: fallback,
      include-all: true,
      tolerance: 20,
      interval: 300,
      filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"
    }

